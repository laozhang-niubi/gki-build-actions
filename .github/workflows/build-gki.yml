name: Build GKI 5.10.252


on:
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison bc libssl-dev


      - name: Clone kernel source
        run: |
          git clone --depth 1 --branch android12-5.10.252_r00 \
            https://android.googlesource.com/kernel/common kernel
          cd kernel
          git log --oneline -1


      - name: Setup AOSP Clang 12.0.5 (clang-r416183b)
        run: |
          echo "Downloading AOSP clang-r416183b..."
          mkdir -p ~/aosp-clang
          cd ~/aosp-clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/clang-r416183b.tar.gz -O clang.tar.gz
          tar xzf clang.tar.gz
          echo "Clang installed at $(pwd)"
          ./bin/clang --version


      - name: Configure kernel
        run: |
          cd kernel
          export PATH="$HOME/aosp-clang/bin:$PATH"
          make O=out ARCH=arm64 gki_defconfig
