name: Build GKI 5.10.252




on:
  workflow_dispatch:




jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison bc libssl-dev




      - name: Clone kernel source
        run: |
          git clone --depth 1 --branch android12-5.10.252_r00 \
            https://android.googlesource.com/kernel/common kernel
          cd kernel
          git log --oneline -1




      - name: Setup Clang 12 (LLVM 12.0.1)
        run: |
          echo "Downloading LLVM clang 12.0.1..."
          mkdir -p ~/clang12
          cd ~/clang12
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-12.0.1/clang+llvm-12.0.1-x86_64-linux-gnu-ubuntu-16.04.tar.xz -O clang.tar.xz
          tar xf clang.tar.xz --strip-components=1
          echo "Clang installed at $(pwd)"
          ./bin/clang --version



