name: Build GKI 5.10.252
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - run: echo setup
      - run: |
          make O=out gki_defconfig
          make O=out -j4 Image.gz modules dtbs
      - uses: actions/upload-artifact@v4
        with:
          name: test
          path: out/Image.gz
