name: Build GKI 5.10.252








on:
  workflow_dispatch:








jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison bc libssl-dev








      - name: Clone kernel source
        run: |
          git clone --depth 1 --branch android12-5.10.252_r00 \
            https://android.googlesource.com/kernel/common kernel
          cd kernel
          git log --oneline -1








      
      - name: Setup Clang 12 (LLVM 12.0.1)
        run: |
          echo "Downloading LLVM clang 12.0.1..."
          mkdir -p ~/clang12
          cd ~/clang12
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-12.0.1/clang+llvm-12.0.1-x86_64-linux-gnu-ubuntu-16.04.tar.xz -O clang.tar.xz
          tar xf clang.tar.xz --strip-components=1
          echo "Clang installed at $(pwd)"
          ./bin/clang --version
          ./bin/ld.lld --version
          # Create cross-compile symlinks
          ln -s ld.lld bin/aarch64-linux-gnu-ld.lld
          ln -s llvm-ar bin/aarch64-linux-gnu-llvm-ar
          ln -s llvm-nm bin/aarch64-linux-gnu-llvm-nm
          ln -s llvm-objcopy bin/aarch64-linux-gnu-llvm-objcopy
          ln -s llvm-objdump bin/aarch64-linux-gnu-llvm-objdump
          ln -s llvm-strip bin/aarch64-linux-gnu-llvm-strip
      - name: Configure kernel
        run: |
          cd kernel
          export PATH="$HOME/clang12/bin:$PATH"
          export ARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          scripts/kconfig/merge_config.sh arch/arm64/configs/gki_defconfig <(echo 'CONFIG_CMDLINE="earlycon initcall_debug"')
          make LLVM=1 olddefconfig



      - name: Build kernel
        run: |
          cd kernel
          export PATH="$HOME/clang12/bin:$PATH"
          export ARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make LLVM=1 -j$(nproc) Image.gz modules dtbs



      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-kernel
          path: |
            kernel/arch/arm64/boot/Image.gz
            kernel/arch/arm64/boot/dts/**/*.dtb
            kernel/*.ko
            kernel/.config
