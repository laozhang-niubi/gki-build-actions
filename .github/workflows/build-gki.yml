name: Build GKI 5.10.252
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - run: git clone --depth 1 --branch android12-5.10.252_r00 https://android.googlesource.com/kernel/common kernel
      - run: echo built
      - uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: kernel/out/Image.gz
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log
          path: kernel/build.log
