name: Build GKI 5.10.252
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison bc libssl-dev
      - name: Clone kernel source
        run: |
          git clone --depth 1 --branch android12-5.10.252_r00 https://android.googlesource.com/kernel/common kernel
          cd kernel
          git log --oneline -1
