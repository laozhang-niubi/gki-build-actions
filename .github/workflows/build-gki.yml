name: B
on: workflow_dispatch
jobs:
  b:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - run: chmod +x build.sh && ./build.sh
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: log
        path: k/o.log
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: kernel
        path: k/o/arch/arm64/boot/Image.gz
