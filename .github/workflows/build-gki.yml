name: Build GKI 5.10.252
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - run: echo setup
      - run: |
          make gki_defconfig
          make -j4 Image.gz 2>&1 | tee build.log
      - uses: actions/upload-artifact@v4
        with:
          name: test
          path: Image.gz
