name: Build GKI 5.10.252
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - run: sudo apt-get install -y flex bison
      - run: git clone --depth 1 --branch android12-5.10.252_r00 https://android.googlesource.com/kernel/common kernel
      - run: git clone --depth 1 --branch llvm-r416183 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 ~/aosp-clang
      - run: |
          cd kernel
          export PATH="$HOME/aosp-clang/clang-r416183/bin:$PATH"
          make O=out ARCH=arm64 LLVM=1 CLANG_TRIPLE=aarch64-linux-gnu- gki_defconfig
          make O=out ARCH=arm64 LLVM=1 CLANG_TRIPLE=aarch64-linux-gnu- -j4 Image.gz modules dtbs 2>&1 | tee build.log
      - uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: kernel/out/arch/arm64/boot/Image.gz
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: log
          path: kernel/build.log
