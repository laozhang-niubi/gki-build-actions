name: Build GKI 5.10.252








on:
  workflow_dispatch:








jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison bc libssl-dev








      - name: Clone kernel source
        run: |
          git clone --depth 1 --branch android12-5.10.252_r00 \
            https://android.googlesource.com/kernel/common kernel
          cd kernel
          git log --oneline -1








      
      
      - name: Setup AOSP Clang (llvm-r416183)
        run: |
          echo "Cloning AOSP llvm-r416183..."
          git clone --depth 1 --branch llvm-r416183 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 ~/aosp-clang
          echo "Clang installed at ~/aosp-clang/clang-r416183"
          ~/aosp-clang/clang-r416183/bin/clang --version
      - name: Configure kernel
        run: |
          cd kernel
          export PATH=$HOME/aosp-clang/bin:$PATH
          export ARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          scripts/kconfig/merge_config.sh arch/arm64/configs/gki_defconfig <(echo 'CONFIG_CMDLINE=earlycon initcall_debug')
          make LLVM=1 olddefconfig



      - name: Build kernel
        run: |
          cd kernel
          export PATH=$HOME/aosp-clang/bin:$PATH
          export ARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make LLVM=1 -j$(nproc) Image.gz modules dtbs



      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gki-kernel
          path: |
            kernel/arch/arm64/boot/Image.gz
            kernel/arch/arm64/boot/dts/**/*.dtb
            kernel/*.ko
            kernel/.config
