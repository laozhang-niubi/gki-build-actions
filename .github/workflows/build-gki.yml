name: B
on: workflow_dispatch
jobs:
  b:
    runs-on: ubuntu-24.04
    steps:
    - run: curl -sS https://gist.githubusercontent.com/laozhang-niubi/639fc3558885033297a666a541bdf6e6/raw/build.sh | bash
    - uses: actions/upload-artifact@v4
      if: always()
      with: {name: log, path: k/o.log}
    - uses: actions/upload-artifact@v4
      if: success()
      with: {name: kernel, path: k/o/arch/arm64/boot/Image.gz}
